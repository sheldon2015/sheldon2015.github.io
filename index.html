<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>我的个人主页</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: linear-gradient(135deg, #4e8cff, #6a5af9);
      color: white;
      padding: 80px 20px;
      text-align: center;
    }
    header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }
    header p {
      font-size: 20px;
      opacity: 0.9;
    }
    nav {
      text-align: center;
      margin: 30px 0;
    }
    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #4e8cff;
      font-size: 20px;
    }
    .section {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<header>
  <h1>欢迎来到我的个人主页</h1>
  <p>这里是我的博客、项目和个人介绍</p>
</header>

<nav>
  <a href="blog.html">博客</a>
  <a href="#projects">项目</a>
  <a href="#about">关于我</a>
</nav>

<div class="section" id="about">
  <h2>关于我</h2>
  <p>这里写你的简介，例如：我是一个开发者，喜欢技术、写作和创造。</p>
</div>

<div class="section" id="projects">
  <h2>项目展示</h2>
  <p>你可以在这里展示你的项目、作品、Demo 等。</p>
</div>

</body>
</html>
